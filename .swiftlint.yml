# .swiftlint.yml

included:
  - LonelyPianist
  - LonelyPianistAVP
  - LonelyPianistTests
  - LonelyPianistAVPTests

excluded:
  - .build
  - DerivedData
  - Pods
  - Packages/RealityKitContent
  - .xcodebuildmcp
  - piano_dialogue_server

opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - sorted_imports
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - redundant_type_annotation

disabled_rules:
  - trailing_whitespace   # swiftformat 会处理
  - line_length           # 先不强制，后续收紧

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - z
    - i
    - n

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

reporter: "xcode"