name: Swift Quality

on:
  push:
    paths:
      - "**/*.swift"
      - ".swiftformat"
      - ".swiftlint.yml"
      - ".github/workflows/swift-quality.yml"
  pull_request:
    paths:
      - "**/*.swift"
      - ".swiftformat"
      - ".swiftlint.yml"
      - ".github/workflows/swift-quality.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: swift-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-and-lint:
    name: SwiftFormat and SwiftLint
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Swift tooling
        run: |
          brew update
          brew list swiftformat >/dev/null 2>&1 || brew install swiftformat
          brew list swiftlint >/dev/null 2>&1 || brew install swiftlint

      - name: Print tool versions
        run: |
          swift --version
          swiftformat --version
          swiftlint version

      - name: Run SwiftFormat
        run: |
          swiftformat \
            --config .swiftformat \
            LonelyPianist \
            LonelyPianistAVP \
            LonelyPianistTests \
            LonelyPianistAVPTests

      - name: Run SwiftLint autocorrect
        run: |
          swiftlint --fix --config .swiftlint.yml

      - name: Commit formatter updates
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No SwiftFormat or SwiftLint autocorrect changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Apply SwiftFormat and SwiftLint autocorrect"
          git push

      - name: Run SwiftLint
        run: |
          swiftlint lint --config .swiftlint.yml
